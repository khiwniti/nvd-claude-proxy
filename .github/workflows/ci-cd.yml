name: CI/CD Pipeline

on:
  push:
    branches: [ main, "claude/**", "feat/**", "fix/**" ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.7"
      - name: Check formatting and lint
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package with dev extras
        run: pip install -e ".[dev,full]"
      - name: Run mypy
        run: mypy src/nvd_claude_proxy

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package with dev and full extras
        run: pip install -e ".[dev,full]"
      - name: Run unit tests
        run: pytest tests/unit -v --tb=short

  publish:
    name: Publish to PyPI
    needs: [ lint, typecheck, test ]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (secrets.PYPI_API_TOKEN != '' || vars.PYPI_TRUSTED_PUBLISH == 'true')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # Needed only for trusted publishing path
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Publish to PyPI (API token)
        if: secrets.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Publish to PyPI (trusted publishing)
        if: secrets.PYPI_API_TOKEN == '' && vars.PYPI_TRUSTED_PUBLISH == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
