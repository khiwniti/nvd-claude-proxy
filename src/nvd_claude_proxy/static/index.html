<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nvd-claude-proxy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 text-white flex-shrink-0 flex flex-col">
            <div class="p-6">
                <h1 class="text-xl font-bold flex items-center">
                    <i data-lucide="shield-check" class="mr-2 text-indigo-400"></i>
                    nvd-claude-proxy
                </h1>
                <p class="text-xs text-gray-400 mt-1 uppercase tracking-wider font-semibold">Management UI</p>
            </div>
            <nav class="mt-4 px-4 space-y-2 flex-grow">
                <button data-tab="sessions" class="w-full flex items-center px-4 py-2.5 rounded-lg bg-indigo-600 text-white font-medium transition-all duration-200 nav-btn">
                    <i data-lucide="list" class="w-5 h-5 mr-3"></i> Sessions
                </button>
                <button data-tab="models" class="w-full flex items-center px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-all duration-200 nav-btn">
                    <i data-lucide="cpu" class="w-5 h-5 mr-3"></i> Models
                </button>
                <button data-tab="transformers" class="w-full flex items-center px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-all duration-200 nav-btn">
                    <i data-lucide="shuffle" class="w-5 h-5 mr-3"></i> Transformers
                </button>
                <button data-tab="monitor" class="w-full flex items-center px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-all duration-200 nav-btn">
                    <i data-lucide="activity" class="w-5 h-5 mr-3"></i> Live Monitor
                </button>
            </nav>
            <div class="p-6 text-xs text-gray-500">
                v1.0.0 &bull; NVIDIA NIM Proxy
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-gray-50 p-8">
            <div id="content-area">
                <!-- Content will be injected here by dashboard.js -->
                <div class="flex items-center justify-center h-full">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/dashboard.js" type="module"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
